<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PhCharts — Comunidade</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a0a12;
    --surface:  #13131e;
    --surface2: #1a1a2e;
    --border:   #2a2a45;
    --text:     #d0d4e8;
    --muted:    #6a7090;
    --accent:   #5090ff;
    --gold:     #f0c040;
    --easy:     #40c080;
    --normal:   #50a8ff;
    --hard:     #f08030;
    --extreme:  #e04050;
    --radius:   10px;
  }

  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }

  /* ── nav ── */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .nav-logo { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
  .nav-logo span { color: var(--gold); }
  nav button { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
  nav button:hover { opacity: .85; }

  /* ── filtros ── */
  .filters { max-width: 1100px; margin: 24px auto 0; padding: 0 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .filters input, .filters select { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 13px; outline: none; transition: border-color .15s; }
  .filters input { flex: 1; min-width: 200px; }
  .filters input:focus, .filters select:focus { border-color: var(--accent); }
  .filters select option { background: #1a1a2e; }
  .diff-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-size: 12px; cursor: pointer; transition: all .15s; }
  .pill:hover { border-color: var(--accent); color: var(--text); }
  .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .pill.easy.active   { background: var(--easy);    border-color: var(--easy); }
  .pill.normal.active { background: var(--normal);  border-color: var(--normal); }
  .pill.hard.active   { background: var(--hard);    border-color: var(--hard); }
  .pill.extreme.active{ background: var(--extreme); border-color: var(--extreme); }

  /* ── grid ── */
  .grid { max-width: 1100px; margin: 20px auto 40px; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }

  /* ── card ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: transform .15s, border-color .15s; display: flex; flex-direction: column; }
  .card:hover { transform: translateY(-3px); border-color: #3a3a6a; }
  .cover { height: 120px; background: var(--surface2); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .cover img { width: 100%; height: 100%; object-fit: cover; }
  .cover .no-cover { font-size: 36px; opacity: .3; }
  .diff-badge { position: absolute; top: 8px; right: 8px; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; }
  .diff-badge.easy    { background: #1a4a30; color: var(--easy); }
  .diff-badge.normal  { background: #1a2f4a; color: var(--normal); }
  .diff-badge.hard    { background: #4a2a10; color: var(--hard); }
  .diff-badge.extreme { background: #4a1520; color: var(--extreme); }
  .diff-badge.unknown { background: #2a2a3a; color: var(--muted); }
  .diff-num { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,.6); color: var(--gold); font-size: 12px; font-weight: 700; padding: 2px 7px; border-radius: 5px; }

  .card-body { padding: 10px 12px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .card-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-author { font-size: 11px; color: var(--muted); }
  .card-meta { font-size: 11px; color: var(--muted); }
  .stars { display: flex; align-items: center; gap: 4px; margin: 4px 0; }
  .star { font-size: 14px; color: var(--border); cursor: pointer; transition: color .1s; }
  .star.lit { color: var(--gold); }
  .star:hover { color: var(--gold); }
  .rating-count { font-size: 11px; color: var(--muted); }
  .card-actions { display: flex; gap: 6px; padding: 0 12px 12px; margin-top: auto; }
  .btn { flex: 1; padding: 7px 0; border-radius: 7px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; transition: opacity .15s; }
  .btn:hover { opacity: .8; }
  .btn-dl   { background: var(--accent); color: #fff; }
  .btn-prev { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

  /* ── contador ── */
  .count-bar { max-width: 1100px; margin: 0 auto; padding: 0 20px; color: var(--muted); font-size: 12px; }

  /* ── modal upload ── */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 420px; max-width: 95vw; }
  .modal h2 { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 18px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .field input { width: 100%; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 7px; padding: 9px 11px; font-size: 13px; outline: none; }
  .field input:focus { border-color: var(--accent); }
  .drop-zone { border: 2px dashed var(--border); border-radius: 9px; padding: 18px; text-align: center; color: var(--muted); font-size: 12px; cursor: pointer; transition: border-color .15s, color .15s; }
  .drop-zone:hover, .drop-zone.over { border-color: var(--accent); color: var(--accent); }
  .drop-zone.ready { border-color: var(--easy); color: var(--easy); }
  .modal-btns { display: flex; gap: 8px; margin-top: 18px; }
  .modal-btns button { flex: 1; padding: 10px 0; border-radius: 8px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; }
  .btn-cancel { background: var(--surface2); color: var(--muted); border: 1px solid var(--border) !important; }
  .btn-submit { background: var(--accent); color: #fff; }
  .btn-submit:hover { opacity: .85; }
  .msg { padding: 8px 12px; border-radius: 7px; font-size: 12px; margin-top: 10px; display: none; }
  .msg.ok  { background: #1a3a25; color: var(--easy); }
  .msg.err { background: #3a1a20; color: var(--extreme); }

  /* ── toast ── */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #222235; color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 10px 20px; font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 300; }
  #toast.show { opacity: 1; }

  /* ── empty ── */
  .empty { text-align: center; padding: 60px 0; color: var(--muted); font-size: 14px; grid-column: 1 / -1; }

  /* ── spinner ── */
  .spinner { display: flex; justify-content: center; padding: 40px; grid-column: 1 / -1; }
  .spin { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Ph<span>Charts</span></div>
  <button onclick="openUpload()">+ Enviar Chart</button>
</nav>

<div class="filters">
  <input id="search" type="text" placeholder="🔍  buscar por nome ou autor..." oninput="debounce(loadCharts)">
  <div class="diff-pills">
    <div class="pill active" data-diff="" onclick="setDiff(this)">Todos</div>
    <div class="pill easy"   data-diff="easy"    onclick="setDiff(this)">Fácil  1–10</div>
    <div class="pill normal" data-diff="normal"  onclick="setDiff(this)">Normal  11–14</div>
    <div class="pill hard"   data-diff="hard"    onclick="setDiff(this)">Difícil  15–16</div>
    <div class="pill extreme"data-diff="extreme" onclick="setDiff(this)">Extremo  17+</div>
  </div>
  <select id="sort" onchange="loadCharts()">
    <option value="recent">Mais recentes</option>
    <option value="rating">Melhor avaliados</option>
    <option value="downloads">Mais baixados</option>
  </select>
</div>

<div class="count-bar" id="countBar"></div>
<div class="grid" id="grid"><div class="spinner"><div class="spin"></div></div></div>

<!-- Modal Upload -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeUpload()">
  <div class="modal">
    <h2>Enviar chart</h2>
    <div class="field">
      <label>Seu nome / apelido</label>
      <input id="upAuthor" type="text" placeholder="ex: marcos" maxlength="40">
    </div>
    <div class="field">
      <label>Arquivo .phchart</label>
      <div class="drop-zone" id="dzChart" onclick="document.getElementById('fileChart').click()"
           ondragover="dragOver(event,'dzChart')" ondragleave="dragLeave('dzChart')" ondrop="dropFile(event,'fileChart','dzChart')">
        <span id="dzChartLabel">clique ou arraste o .phchart aqui</span>
        <input id="fileChart" type="file" accept=".phchart" style="display:none" onchange="fileChosen('fileChart','dzChart','dzChartLabel')">
      </div>
    </div>
    <div class="field">
      <label>Capa (opcional — PNG/JPG)</label>
      <div class="drop-zone" id="dzCover" onclick="document.getElementById('fileCover').click()"
           ondragover="dragOver(event,'dzCover')" ondragleave="dragLeave('dzCover')" ondrop="dropFile(event,'fileCover','dzCover')">
        <span id="dzCoverLabel">clique ou arraste uma imagem</span>
        <input id="fileCover" type="file" accept=".png,.jpg,.jpeg,.webp" style="display:none" onchange="fileChosen('fileCover','dzCover','dzCoverLabel')">
      </div>
    </div>
    <div class="msg" id="upMsg"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeUpload()">Cancelar</button>
      <button class="btn-submit" onclick="submitUpload()">Publicar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let currentDiff = "";
let debTimer;
function debounce(fn) { clearTimeout(debTimer); debTimer = setTimeout(fn, 350); }

function setDiff(el) {
  document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
  el.classList.add("active");
  currentDiff = el.dataset.diff;
  loadCharts();
}

async function loadCharts() {
  const q    = document.getElementById("search").value.trim();
  const sort = document.getElementById("sort").value;
  const params = new URLSearchParams({ sort, diff: currentDiff, q });
  document.getElementById("grid").innerHTML = '<div class="spinner"><div class="spin"></div></div>';
  try {
    const res  = await fetch("/api/charts?" + params);
    const data = await res.json();
    renderCharts(data);
  } catch(e) {
    document.getElementById("grid").innerHTML = '<div class="empty">Erro ao carregar charts.</div>';
  }
}

function renderCharts(charts) {
  const grid = document.getElementById("grid");
  document.getElementById("countBar").textContent =
    charts.length === 0 ? "" : charts.length + " chart" + (charts.length > 1 ? "s" : "");
  if (!charts.length) {
    grid.innerHTML = '<div class="empty">Nenhum chart encontrado.</div>';
    return;
  }
  grid.innerHTML = charts.map(c => cardHTML(c)).join("");
}

function diffInfo(c) {
  return { cls: c.diff_color || "unknown", lbl: c.diff_label || "?" };
}

function starsHTML(chartId, avg, count) {
  const full = Math.round(avg);
  let s = "";
  for (let i = 1; i <= 5; i++) {
    s += `<span class="star ${i <= full ? 'lit' : ''}" onclick="rate('${chartId}', ${i}, this)">${i <= full ? "★" : "☆"}</span>`;
  }
  s += `<span class="rating-count" id="rc-${chartId}">${count > 0 ? avg.toFixed(1) + " (" + count + ")" : "sem avaliações"}</span>`;
  return s;
}

function cardHTML(c) {
  const di = diffInfo(c);
  const coverHtml = c.cover
    ? `<img src="/covers/${c.cover}" alt="capa" loading="lazy">`
    : `<span class="no-cover">♪</span>`;
  const diffNum = c.difficulty !== "" ? `<div class="diff-num">${c.difficulty}</div>` : "";
  return `
    <div class="card">
      <div class="cover">
        ${coverHtml}
        ${diffNum}
        <div class="diff-badge ${di.cls}">${di.lbl}</div>
      </div>
      <div class="card-body">
        <div class="card-name" title="${esc(c.chart_name)}">${esc(c.chart_name)}</div>
        <div class="card-author">por ${esc(c.author)}</div>
        <div class="card-meta">${c.columns} colunas · ${c.note_count} notas</div>
        <div class="stars">${starsHTML(c.id, c.rating_avg, c.rating_count)}</div>
        <div class="card-meta">⬇ ${c.downloads} download${c.downloads !== 1 ? "s" : ""}</div>
      </div>
      <div class="card-actions">
        <button class="btn btn-dl" onclick="download('${c.id}', '${esc(c.chart_name)}')">⬇ Baixar</button>
      </div>
    </div>`;
}

function esc(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function download(id, name) {
  toast("Baixando " + name + "...");
  const a = document.createElement("a");
  a.href = "/api/download/" + id;
  a.download = name + ".phchart";
  a.click();
  // atualiza contador no card sem recarregar tudo
  setTimeout(loadCharts, 1200);
}

async function rate(id, stars, el) {
  try {
    const res  = await fetch("/api/rate/" + id, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ stars })
    });
    const data = await res.json();
    if (data.ok) {
      // atualiza estrelas localmente
      const parent = el.closest(".stars");
      const allStars = parent.querySelectorAll(".star");
      allStars.forEach((s, i) => s.classList.toggle("lit", i < stars));
      parent.querySelector(".rating-count").textContent =
        data.avg.toFixed(1) + " (" + data.count + ")";
      toast("Avaliação registrada!");
    }
  } catch(e) { toast("Erro ao avaliar."); }
}

// ── upload ────────────────────────────────────────────────────────────
function openUpload()  { document.getElementById("modalBg").classList.add("open"); }
function closeUpload() { document.getElementById("modalBg").classList.remove("open"); hideMsg(); }

function dragOver(e, zoneId)  { e.preventDefault(); document.getElementById(zoneId).classList.add("over"); }
function dragLeave(zoneId)    { document.getElementById(zoneId).classList.remove("over"); }
function dropFile(e, inputId, zoneId) {
  e.preventDefault(); dragLeave(zoneId);
  const input = document.getElementById(inputId);
  const dt    = new DataTransfer();
  dt.items.add(e.dataTransfer.files[0]);
  input.files = dt.files;
  const lbl = zoneId === "dzChart" ? "dzChartLabel" : "dzCoverLabel";
  fileChosen(inputId, zoneId, lbl);
}
function fileChosen(inputId, zoneId, lblId) {
  const f = document.getElementById(inputId).files[0];
  if (f) {
    document.getElementById(lblId).textContent = "✓ " + f.name;
    document.getElementById(zoneId).classList.add("ready");
    document.getElementById(zoneId).classList.remove("over");
  }
}

async function submitUpload() {
  const author = document.getElementById("upAuthor").value.trim() || "anônimo";
  const chartFile  = document.getElementById("fileChart").files[0];
  const coverFile  = document.getElementById("fileCover").files[0];
  if (!chartFile) { showMsg("Selecione um arquivo .phchart.", "err"); return; }
  const fd = new FormData();
  fd.append("author", author);
  fd.append("phchart", chartFile);
  if (coverFile) fd.append("cover", coverFile);
  try {
    const res  = await fetch("/api/upload", { method: "POST", body: fd });
    const data = await res.json();
    if (data.ok) {
      showMsg("Chart publicado com sucesso!", "ok");
      setTimeout(() => { closeUpload(); loadCharts(); }, 1500);
    } else {
      showMsg(data.error || "Erro desconhecido.", "err");
    }
  } catch(e) { showMsg("Erro de conexão.", "err"); }
}

function showMsg(txt, type) {
  const el = document.getElementById("upMsg");
  el.textContent = txt; el.className = "msg " + type; el.style.display = "block";
}
function hideMsg() {
  const el = document.getElementById("upMsg");
  el.style.display = "none"; el.textContent = "";
}

// ── toast ──────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2500);
}

loadCharts();
</script>
</body>
</html>
